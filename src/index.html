<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <title>Modrinth Modifier</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --surface2: #1a1a1a;
      --border: #242424;
      --accent: #1bd96a;
      --accent-dim: rgba(27, 217, 106, 0.12);
      --text: #e8e8e8;
      --text-dim: #666;
      --text-mid: #999;
      --danger: #e05252;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* Titlebar */
    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 42px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      flex-shrink: 0;
    }

    .titlebar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 20px;
      height: 20px;
      background: var(--accent);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
      color: #000;
      letter-spacing: -0.5px;
    }

    .titlebar-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-mid);
      letter-spacing: 0.3px;
    }

    .titlebar-version {
      font-size: 11px;
      color: var(--text-dim);
      background: var(--border);
      padding: 2px 7px;
      border-radius: 4px;
      margin-left: 2px;
    }

    .titlebar-controls {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    .titlebar-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      font-size: 14px;
    }

    .titlebar-btn:hover { background: var(--border); color: var(--text); }
    .titlebar-btn.close:hover { background: var(--danger); color: #fff; }
    .titlebar-btn, .titlebar-controls { -webkit-app-region: no-drag; }

    /* Content */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .header {
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* Error */
    .error-box {
      background: rgba(224, 82, 82, 0.1);
      border: 1px solid rgba(224, 82, 82, 0.3);
      border-radius: 10px;
      padding: 16px 20px;
      color: var(--danger);
      font-size: 13px;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-dim);
      font-size: 13px;
      padding: 40px 0;
      justify-content: center;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Profile cards */
    .profiles {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .profile-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      transition: border-color 0.2s, background 0.2s;
    }

    .profile-card:hover {
      border-color: #333;
      background: var(--surface2);
    }

    .profile-card.editing {
      border-color: var(--accent);
      background: var(--surface2);
    }

    .profile-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .profile-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.2px;
    }

    .profile-time {
      font-size: 13px;
      color: var(--text-mid);
      margin-top: 4px;
    }

    .profile-time span {
      color: var(--accent);
      font-weight: 600;
    }

    .edit-btn {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(27, 217, 106, 0.2);
      border-radius: 7px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .edit-btn:hover {
      background: rgba(27, 217, 106, 0.2);
      border-color: rgba(27, 217, 106, 0.4);
    }

    /* Edit panel */
    .edit-panel {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      display: none;
      gap: 12px;
      flex-direction: column;
    }

    .profile-card.editing .edit-panel {
      display: flex;
    }

    .edit-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .edit-label {
      font-size: 12px;
      color: var(--text-dim);
      width: 130px;
      flex-shrink: 0;
    }

    .edit-inputs {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 1;
    }

    .time-input-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .time-input-group label {
      font-size: 11px;
      color: var(--text-dim);
    }

    input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 13px;
      width: 72px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    input[type="number"]:focus {
      border-color: var(--accent);
    }

    .edit-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .btn-save {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 7px;
      padding: 7px 18px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-save:hover { opacity: 0.85; }

    .btn-cancel {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .btn-cancel:hover { background: var(--border); color: var(--text); }

    .save-msg {
      font-size: 12px;
      color: var(--accent);
      display: none;
      align-items: center;
      gap: 5px;
    }

    .save-msg.visible { display: flex; }

    .total-bar {
      margin-top: 24px;
      padding: 14px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total-bar-label {
      font-size: 13px;
      color: var(--text-dim);
    }

    .total-bar-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="titlebar">
    <div class="titlebar-left">
      <div class="logo">M</div>
      <span class="titlebar-title">Modrinth Modifier</span>
      <span class="titlebar-version" id="app-version"></span>
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn" id="btn-min" title="Minimize">&#8722;</button>
      <button class="titlebar-btn close" id="btn-close" title="Close">&#x2715;</button>
    </div>
  </div>

  <div class="content">
    <div class="header">
      <h1>Playtime Editor</h1>
      <p>Manage playtime across your Modrinth profiles.</p>
    </div>
    <div id="root"><div class="loading"><div class="spinner"></div> Loading profiles...</div></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
