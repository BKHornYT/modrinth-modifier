<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' file:" />
  <title>Modrinth Modifier</title>
  <style>
    /*
     * Layout and design adapted from the Modrinth App (https://github.com/modrinth/code)
     * Copyright (c) Modrinth contributors — GNU Affero General Public License v3
     */

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --surface-1:   #16181c;
      --surface-1-5: #1a1c20;
      --surface-2:   #1d1f23;
      --surface-2-5: #222429;
      --surface-3:   #27292e;
      --surface-4:   #34363c;
      --surface-5:   #42444a;

      --text:     #ffffff;
      --text-mid: #b0bac5;
      --text-dim: #96a2b0;

      --accent:      #1bd96a;
      --accent-dim:  rgba(27, 217, 106, 0.25);
      --accent-dim2: rgba(27, 217, 106, 0.35);

      --danger:     #ff496e;
      --danger-dim: rgba(255, 73, 110, 0.2);

      --btn-border:  rgba(193, 190, 209, 0.12);
      --shadow-card: rgba(0, 0, 0, 0.25) 0px 2px 4px 0px;

      --top-bar-height: 3rem;
      --left-bar-width: 4rem;

      --radius-sm:  0.5rem;
      --radius-md:  0.75rem;
      --radius-lg:  1rem;
      --radius-xl:  1.25rem;
      --radius-max: 9999px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI Variable', 'Segoe UI', sans-serif;
      background: var(--surface-3);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ── App grid (copied from Modrinth's app-grid-layout) ── */
    .app-grid {
      display: grid;
      grid-template:
        'statusbar statusbar' var(--top-bar-height)
        'navbar    content'   1fr
        / var(--left-bar-width) 1fr;
      height: 100vh;
      background: var(--surface-3);
    }

    /* ── Statusbar (top bar) ── */
    .statusbar {
      grid-area: statusbar;
      background: var(--surface-3);
      height: var(--top-bar-height);
      display: flex;
      align-items: center;
      -webkit-app-region: drag;
      border-bottom: 1px solid rgba(0, 0, 0, 0.25);
      padding: 0 0 0 12px;
    }

    .statusbar-logo {
      width: 20px;
      height: 20px;
      object-fit: contain;
      pointer-events: none;
      flex-shrink: 0;
    }

    .statusbar-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-mid);
      margin-left: 8px;
    }

    .statusbar-badges {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-left: 8px;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: var(--radius-max);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .badge-beta {
      background: rgba(255, 163, 71, 0.15);
      color: #ffa347;
      border: 1px solid rgba(255, 163, 71, 0.25);
    }

    .badge-version {
      background: var(--surface-4);
      color: var(--text-dim);
      border: 1px solid var(--btn-border);
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
    }

    .statusbar-spacer { flex: 1; }

    .window-controls {
      display: flex;
      align-items: center;
      height: var(--top-bar-height);
      -webkit-app-region: no-drag;
    }

    .titlebar-btn {
      width: 3rem;
      height: 100%;
      border: none;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      position: relative;
      transition: color 0.1s;
    }

    .titlebar-btn::before {
      content: '';
      width: 2rem;
      height: 2rem;
      border-radius: var(--radius-max);
      position: absolute;
      background: transparent;
      transition: background 0.15s, transform 0.15s;
      transform: scale(0.85);
    }

    .titlebar-btn:hover { color: var(--text); }
    .titlebar-btn:hover::before { background: var(--surface-4); transform: scale(1); }
    .titlebar-btn.close:hover { color: #fff; }
    .titlebar-btn.close:hover::before { background: var(--danger); }

    .titlebar-btn span { position: relative; z-index: 1; }

    /* ── Navbar (left icon bar) ── */
    .navbar {
      grid-area: navbar;
      background: var(--surface-3);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.5rem 0;
      gap: 0.25rem;
      width: var(--left-bar-width);
    }

    .nav-btn {
      width: 3rem;
      height: 3rem;
      border-radius: var(--radius-max);
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s;
      position: relative;
      flex-shrink: 0;
    }

    .nav-btn svg {
      width: 1.25rem;
      height: 1.25rem;
      pointer-events: none;
    }

    .nav-btn:hover { background: var(--surface-4); color: var(--text); }

    .nav-btn.active {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .nav-btn.active:hover { background: var(--accent-dim2); }

    .nav-btn.disabled {
      opacity: 0.35;
      cursor: default;
      pointer-events: none;
    }

    .nav-divider {
      width: 1.5rem;
      height: 1px;
      background: var(--surface-5);
      margin: 0.25rem 0;
      flex-shrink: 0;
    }

    .nav-spacer { flex: 1; }

    /* Tooltip */
    .nav-btn[data-tip] { position: relative; }
    .nav-btn[data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      left: calc(100% + 10px);
      top: 50%;
      transform: translateY(-50%);
      background: #000;
      color: var(--text);
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 100;
    }

    .nav-btn[data-tip]:hover::after { opacity: 1; }

    /* ── Content area ── */
    .app-contents {
      grid-area: content;
      background: var(--surface-1);
      border-top-left-radius: var(--radius-xl);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Update banner ── */
    .update-banner {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      background: rgba(27, 217, 106, 0.06);
      border-bottom: 1px solid rgba(27, 217, 106, 0.12);
      font-size: 12px;
      color: var(--text-mid);
      flex-shrink: 0;
    }

    .update-banner.show { display: flex; }

    .update-banner-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .update-banner b { color: var(--accent); }

    .update-notes-toggle {
      background: transparent;
      border: 1px solid rgba(27, 217, 106, 0.3);
      color: var(--accent);
      border-radius: var(--radius-max);
      padding: 2px 9px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      flex-shrink: 0;
      transition: background 0.12s;
      display: none;
    }

    .update-notes-toggle:hover { background: var(--accent-dim); }

    .update-banner-btn {
      margin-left: auto;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius-sm);
      padding: 4px 13px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      flex-shrink: 0;
      transition: opacity 0.12s;
    }

    .update-banner-btn:hover { opacity: 0.85; }
    .update-banner-btn:disabled { opacity: 0.5; cursor: default; }

    .update-progress {
      flex: 1;
      height: 3px;
      background: var(--surface-5);
      border-radius: var(--radius-max);
      overflow: hidden;
      display: none;
    }

    .update-progress.show { display: block; }

    .update-progress-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.2s;
    }

    /* ── Changelog panel ── */
    .update-notes-panel {
      display: none;
      background: rgba(27, 217, 106, 0.04);
      border-bottom: 1px solid rgba(27, 217, 106, 0.1);
      padding: 10px 14px 12px;
      flex-shrink: 0;
    }

    .update-notes-panel.open { display: block; }

    .update-notes-content {
      font-size: 12px;
      color: var(--text-mid);
      line-height: 1.6;
      max-height: 160px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--surface-5) transparent;
      white-space: pre-wrap;
      font-family: inherit;
    }

    .update-notes-content strong { color: var(--text); font-weight: 600; }

    /* ── Page layout ── */
    .page {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .page.active { display: flex; }

    .page-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--surface-4);
      flex-shrink: 0;
    }

    .page-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .page-subtitle {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 3px;
    }

    .page-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
      scrollbar-width: thin;
      scrollbar-color: var(--surface-5) transparent;
    }

    /* ── Buttons (ported from Modrinth's .btn) ── */
    .btn {
      font-weight: 500;
      font-family: inherit;
      font-size: 0.875rem;
      line-height: 1.25rem;
      border: none;
      border-radius: var(--radius-md);
      padding: 0.5rem 1rem;
      background: var(--surface-4);
      color: var(--text-mid);
      box-shadow: inset 0px -1px 1px hsla(221, 39%, 11%, 0.25);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: filter 0.2s ease-in-out, transform 0.05s ease-in-out;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn:hover:not(:disabled) { filter: brightness(1.25); }
    .btn:active:not(:disabled) { transform: scale(0.95); }
    .btn:disabled { cursor: not-allowed; filter: grayscale(50%); opacity: 0.5; }

    .btn-primary {
      background: var(--accent);
      color: #000;
      font-weight: 700;
    }

    .btn-secondary {
      background: var(--accent-dim);
      color: var(--text);
    }

    .btn-transparent {
      background: transparent;
      box-shadow: none;
      color: var(--text-dim);
    }

    .btn-transparent:hover:not(:disabled) {
      background: var(--surface-4);
      filter: none;
      color: var(--text);
    }

    /* ── Cards (ported from Modrinth's .card / .base-card) ── */
    .card {
      background: var(--surface-3);
      border-radius: var(--radius-lg);
      box-shadow: rgba(0, 0, 0, 0.25) 0px 2px 4px 0px;
      margin-bottom: 0.75rem;
      overflow: hidden;
    }

    /* Profile card internals */
    .profile-card-row {
      display: flex;
      align-items: center;
      padding: 0.875rem 1.25rem;
      gap: 1rem;
      transition: filter 0.15s;
    }

    .profile-card-info { flex: 1; min-width: 0; }

    .profile-name {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .profile-time {
      font-size: 0.8125rem;
      color: var(--text-mid);
      margin-top: 2px;
    }

    .profile-time b { color: var(--text); font-weight: 600; }

    /* Edit panel */
    .edit-panel {
      display: none;
      border-top: 1px solid var(--surface-5);
      padding: 1rem 1.25rem;
      gap: 0.75rem;
      flex-direction: column;
      background: var(--surface-2-5);
    }

    .edit-panel.open { display: flex; }

    .edit-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }

    .edit-lbl { font-size: 0.8125rem; color: var(--text-mid); width: 130px; flex-shrink: 0; }

    .time-fields { display: flex; align-items: center; gap: 0.5rem; }

    .time-field { display: flex; align-items: center; gap: 0.375rem; }

    .time-field label { font-size: 0.75rem; color: var(--text-dim); }

    /* Inputs (Modrinth-style) */
    input[type="number"] {
      background: var(--surface-4);
      border: 1px solid var(--btn-border);
      border-radius: var(--radius-md);
      color: var(--text);
      padding: 0.4rem 0.6rem;
      font-size: 0.875rem;
      width: 70px;
      outline: none;
      font-family: inherit;
      -moz-appearance: textfield;
      box-shadow: inset 0px -1px 1px hsla(221, 39%, 11%, 0.25);
      transition: border-color 0.12s, box-shadow 0.12s;
    }

    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim), inset 0px -1px 1px hsla(221, 39%, 11%, 0.25);
    }

    .edit-actions { display: flex; align-items: center; gap: 0.5rem; padding-top: 0.25rem; }

    .saved-msg { font-size: 0.8125rem; color: var(--accent); opacity: 0; transition: opacity 0.2s; }
    .saved-msg.show { opacity: 1; }

    /* Total footer card */
    .total-footer {
      background: var(--surface-3);
      border-radius: var(--radius-lg);
      box-shadow: rgba(0, 0, 0, 0.25) 0px 2px 4px 0px;
      padding: 0.875rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total-footer-label { font-size: 0.8125rem; color: var(--text-dim); }
    .total-footer-value { font-size: 0.9375rem; font-weight: 700; color: var(--text); }

    .status-msg { padding: 2rem 0; text-align: center; font-size: 0.875rem; color: var(--text-dim); }

    .error-msg {
      padding: 1rem 1.25rem;
      background: var(--danger-dim);
      border: 1px solid rgba(255, 73, 110, 0.2);
      border-radius: var(--radius-lg);
      color: var(--danger);
      font-size: 0.875rem;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--surface-5);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="app-grid">

  <!-- Statusbar -->
  <div class="statusbar">
    <img class="statusbar-logo" id="titlebar-icon-img" src="" alt="" />
    <span class="statusbar-title">Modrinth Modifier</span>
    <div class="statusbar-badges">
      <span class="badge badge-beta">Beta</span>
      <span class="badge badge-version" id="app-version"></span>
    </div>
    <div class="statusbar-spacer"></div>
    <div class="window-controls">
      <button class="titlebar-btn" id="btn-min"><span>&#8722;</span></button>
      <button class="titlebar-btn close" id="btn-close"><span>&#x2715;</span></button>
    </div>
  </div>

  <!-- Left navbar -->
  <nav class="navbar">
    <button class="nav-btn active" data-page="playtime" data-tip="Playtime Editor">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
    </button>

    <div class="nav-divider"></div>

    <button class="nav-btn disabled" data-page="mods" data-tip="Mod Manager (Soon)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      </svg>
    </button>

    <button class="nav-btn disabled" data-page="launcher" data-tip="Launcher (Soon)">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
    </button>

    <div class="nav-spacer"></div>
    <div class="nav-divider"></div>

    <button class="nav-btn disabled" data-tip="Settings (Soon)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </nav>

  <!-- Content area -->
  <div class="app-contents">

    <div class="update-banner" id="update-banner">
      <div class="update-banner-dot"></div>
      <span id="update-text">Update available: <b id="update-tag"></b></span>
      <button class="update-notes-toggle" id="update-notes-toggle">What's new &#9660;</button>
      <div class="update-progress" id="update-progress"><div class="update-progress-bar" id="update-bar"></div></div>
      <button class="update-banner-btn" id="update-btn">Update</button>
    </div>
    <div class="update-notes-panel" id="update-notes-panel">
      <div class="update-notes-content" id="update-notes-content"></div>
    </div>

    <!-- Playtime page -->
    <div class="page active" id="page-playtime">
      <div class="page-header">
        <div class="page-title">Playtime Editor</div>
        <div class="page-subtitle">Edit playtime for your Modrinth profiles. Close Modrinth before saving.</div>
      </div>
      <div class="page-body">
        <div id="playtime-root"><div class="status-msg"><span class="spinner"></span>Loading profiles...</div></div>
      </div>
    </div>

  </div>
</div>

<script src="renderer.js"></script>
</body>
</html>
